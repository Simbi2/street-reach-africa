<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Street Reach Africa — Moving Brands. Empowering Riders.</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cabinet+Grotesk:wght@300;400;500;700;800;900&display=swap" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --ink: #08090a; --paper: #f0ece3; --gold: #f0b429; --gold2: #ffd166;
            --fog: #1c1d1f; --fog2: #252628; --mist: rgba(240,236,227,0.07);
            --sub: rgba(240,236,227,0.6); --green: #00e896;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; overflow-x: hidden; }
        body { background: var(--ink); color: var(--paper); font-family: 'Cabinet Grotesk', sans-serif; line-height: 1.6; overflow-x: hidden; }
        section { position: relative; padding: 100px 5%; min-height: auto; display: flex; flex-direction: column; align-items: center; }
        nav { position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: rgba(8,9,10,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--mist); }
        .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--gold); text-decoration: none; }
        .hero { padding-top: 180px; text-align: center; background: radial-gradient(circle at center, #1a1b1e 0%, #08090a 100%); }
        .hero h1 { font-size: clamp(3rem, 8vw, 6rem); font-family: 'Bebas Neue', sans-serif; line-height: 0.9; margin-bottom: 20px; }
        .gold { color: var(--gold); }
        .btn { padding: 16px 32px; border-radius: 50px; font-weight: 700; text-decoration: none; transition: 0.3s; display: inline-block; cursor: pointer; border: none; font-family: 'Cabinet Grotesk'; }
        .btn-gold { background: var(--gold); color: var(--ink); }
        .grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; width: 100%; max-width: 1200px; margin-top: 50px; }
        .card { background: var(--fog); padding: 40px; border-radius: 20px; border: 1px solid var(--mist); }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 2000; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: var(--fog2); padding: 40px; border-radius: 24px; width: 100%; max-width: 500px; position: relative; max-height: 90vh; overflow-y: auto; }
        input, select { width: 100%; padding: 14px; margin-bottom: 15px; background: var(--ink); border: 1px solid var(--mist); color: white; border-radius: 10px; }
    </style>
</head>
<body>
    <nav>
        <a href="#" class="logo">STREET REACH AFRICA</a>
        <button class="btn btn-gold" onclick="toggleModal()">JOIN FLEET</button>
    </nav>
    <section class="hero">
        <h1>ADVERTISING <br><span class="gold">IN MOTION</span></h1>
        <p>Turning Nairobi's delivery network into a high-impact advertising canvas.</p>
        <button class="btn btn-gold" onclick="toggleModal()">Apply as a Rider</button>
    </section>
    <div class="modal" id="regModal">
        <div class="modal-content">
            <button onclick="toggleModal()" style="position: absolute; right: 20px; top: 20px; background: none; border: none; color: white; font-size: 1.5rem;">&times;</button>
            <h2 style="font-family: 'Bebas Neue'; margin-bottom: 20px;">RIDER ONBOARDING</h2>
            <form id="riderForm">
                <input type="text" id="name" required placeholder="Full Name">
                <input type="tel" id="phone" required placeholder="Phone Number">
                <input type="text" id="nid" required placeholder="ID Number">
                <select id="bike"><option value="Motorcycle">Motorcycle</option><option value="Electric">Electric Bike</option></select>
                <button type="submit" class="btn btn-gold" style="width: 100%;">SUBMIT</button>
            </form>
        </div>
    </div>
    <script>
        const supabase = window.supabase.createClient("https://kgnrojmorgetcuxkudjr.supabase.co", "sb_publishable_0Zt06Sat4HMhw-fkfeBCZw_NyUyeMdC");
        function toggleModal() { document.getElementById('regModal').classList.toggle('active'); }
        document.getElementById('riderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "UPLOADING...";
            const { error } = await supabase.from('riders').insert([{
                full_name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                national_id: document.getElementById('nid').value,
                bike_type: document.getElementById('bike').value,
                status: 'pending'
            }]);
            if (error) alert("Error: " + error.message);
            else { alert("Success!"); toggleModal(); e.target.reset(); }
            btn.innerText = "SUBMIT";
        });
    </script>
</body>
</html>
