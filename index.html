<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Street Reach Africa — Moving Brands. Empowering Riders.</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cabinet+Grotesk:wght@300;400;500;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* RESTORED ORIGINAL STYLES */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#08090a;--paper:#f0ece3;--gold:#f0b429;--gold2:#ffd166;
  --fog:#1c1d1f;--fog2:#252628;
  --mist:rgba(240,236,227,0.07);--mist2:rgba(240,236,227,0.04);
  --muted:rgba(240,236,227,0.38);--sub:rgba(240,236,227,0.6);--green:#00e896;
}
html{scroll-behavior:smooth;}
body{background:var(--ink);color:var(--paper);font-family:'Cabinet Grotesk',sans-serif;overflow-x:hidden;font-size:15px;line-height:1.6;}

/* FIX: Section spacing to prevent blank gaps */
section { position: relative; width: 100%; min-height: auto; padding: 100px 52px; overflow: hidden; }

nav{position:fixed;top:0;left:0;right:0;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:11px 52px;background:rgba(8,9,10,0.8);backdrop-filter:blur(20px);border-bottom:1px solid rgba(240,236,227,0.08);}
.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--gold);font-family:'Bebas Neue';font-size:1.5rem;}
.nav-links{display:flex;align-items:center;gap:26px;list-style:none;}
.nav-links a{text-decoration:none;color:var(--muted);font-size:.76rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;}

/* HERO RESTORATION */
.hero{padding-top:200px; display:flex; flex-direction:column; align-items:center; text-align:center;}
.hero h1{font-family:'Bebas Neue'; font-size:clamp(4rem, 10vw, 8rem); line-height:0.85; margin-bottom:20px;}
.gold{color:var(--gold);}

/* RESTORED DOCUMENT FORM STYLING */
.m-inp { background: rgba(255,255,255,0.05); border: 1px solid var(--mist); color: #fff; padding: 14px; border-radius: 8px; margin-bottom: 12px; width: 100%; font-family: inherit; }
.f-label { display: block; margin-bottom: 5px; font-size: 0.8rem; color: var(--gold); font-weight: 700; text-transform: uppercase; }
.modal-btn { background: var(--gold); color: var(--ink); border: none; padding: 18px; border-radius: 40px; font-weight: 900; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 10px; }

/* MODAL RESTORATION */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.95);display:none;z-index:1000;justify-content:center;align-items:center;padding:20px;backdrop-filter:blur(10px);}
.modal-bg.open{display:flex;}
.modal-box{background:var(--fog);padding:40px;border-radius:30px;width:100%;max-width:550px;border:1px solid var(--mist);max-height:90vh;overflow-y:auto;}
</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">STREET REACH AFRICA</a>
  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#impact">Impact</a></li>
    <li><a href="#riders">For Riders</a></li>
  </ul>
  <button class="modal-btn" style="width:auto; padding:10px 25px; font-size:0.7rem;" onclick="openModal()">Join Fleet</button>
</nav>

<section class="hero">
  <h1>MOVING BRANDS.<br><span class="gold">EMPOWERING RIDERS.</span></h1>
  <p style="max-width:600px; color:var(--sub); margin-bottom:40px;">Nairobi's premier transit media network turning delivery bikes into high-impact billboards.</p>
  <button class="modal-btn" style="max-width:300px;" onclick="openModal()">Apply as a Rider</button>
</section>

<div id="riderModal" class="modal-bg">
  <div class="modal-box">
    <h2 style="font-family:'Bebas Neue'; font-size:2.5rem; color:var(--gold); margin-bottom:10px;">RIDER ONBOARDING</h2>
    <p style="color:var(--sub); margin-bottom:20px; font-size:0.9rem;">Submit your details and documents to join the Street Reach fleet.</p>
    
    <div id="regFormInner">
        <input type="text" id="w-name" class="m-inp" placeholder="Full Name *">
        <input type="tel" id="w-phone" class="m-inp" placeholder="WhatsApp Number *">
        <input type="text" id="w-nid-num" class="m-inp" placeholder="National ID Number *">
        
        <select id="w-bike" class="m-inp">
            <option value="Motorcycle">Motorcycle (Boda Boda)</option>
            <option value="Electric">Electric Bike</option>
            <option value="Bicycle">Bicycle</option>
        </select>

        <div style="margin-top:20px;">
            <label class="f-label">National ID (Front)</label>
            <input type="file" id="wf-nid" class="m-inp">
            
            <label class="f-label">Driving License</label>
            <input type="file" id="wf-lic" class="m-inp">
            
            <label class="f-label">Insurance Certificate</label>
            <input type="file" id="wf-ins" class="m-inp">
        </div>

        <button id="wSubmitBtn" class="modal-btn" onclick="submitRider()">Submit Application</button>
        <button onclick="closeModal()" style="background:none; border:none; color:var(--sub); margin-top:15px; width:100%; cursor:pointer;">Cancel</button>
    </div>
  </div>
</div>

<script>
// INITIALIZE WITH YOUR CREDENTIALS
const wdb = supabase.createClient("https://kgnrojmorgetcuxkudjr.supabase.co", "sb_publishable_0Zt06Sat4HMhw-fkfeBCZw_NyUyeMdC");

function openModal() { document.getElementById('riderModal').classList.add('open'); }
function closeModal() { document.getElementById('riderModal').classList.remove('open'); }

async function submitRider() {
  const name = document.getElementById('w-name').value;
  const phone = document.getElementById('w-phone').value;
  const nid = document.getElementById('w-nid-num').value;
  const bike = document.getElementById('w-bike').value;

  if(!name || !phone || !nid) {
    alert("Please fill in all required fields.");
    return;
  }

  const btn = document.getElementById('wSubmitBtn');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  try {
    // 1. Insert Rider Data
    const { data: rider, error: rErr } = await wdb.from('riders').insert({
      full_name: name,
      phone: phone,
      national_id: nid,
      bike_type: bike,
      status: 'pending'
    }).select().single();

    if(rErr) throw rErr;

    // 2. Upload Documents to your 'rider-docs' Bucket
    const docMap = [
      { id: 'wf-nid', type: 'national_id' },
      { id: 'wf-lic', type: 'license' },
      { id: 'wf-ins', type: 'insurance' }
    ];

    for(const d of docMap) {
      const input = document.getElementById(d.id);
      if(input.files[0]) {
        const file = input.files[0];
        const ext = file.name.split('.').pop();
        const path = `rider-${rider.id}/${d.type}.${ext}`;
        await wdb.storage.from('rider-docs').upload(path, file);
      }
    }

    alert("Application Successful!");
    closeModal();
  } catch (err) {
    console.error(err);
    alert("Error: " + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Submit Application';
  }
}
</script>
</body>
</html>
